<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منوی بازی‌های کمک‌آموزشی ریاضی</title>
  <style>
    :root{--bg1:#21195f;--bg2:#0ea5e9;--green:#35e7a2;--shadow:rgba(10,13,52,.35)}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;overflow:hidden;font-family:Tahoma,Arial,sans-serif;color:#fff;background:radial-gradient(circle at 12% 15%,rgba(255,209,102,.36),transparent 28%),radial-gradient(circle at 82% 22%,rgba(255,79,163,.32),transparent 26%),radial-gradient(circle at 55% 92%,rgba(53,231,162,.30),transparent 30%),linear-gradient(135deg,var(--bg1),#26318f 48%,var(--bg2));display:grid;place-items:center}.math-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}.symbol{position:absolute;color:rgba(255,255,255,.18);font-weight:900;user-select:none;animation:floatSymbol var(--duration) linear infinite;text-shadow:0 10px 22px rgba(0,0,0,.18)}@keyframes floatSymbol{0%{transform:translate3d(0,110vh,0) rotate(0) scale(.8);opacity:0}10%,90%{opacity:1}100%{transform:translate3d(var(--drift),-20vh,0) rotate(360deg) scale(1.18);opacity:0}}.sparkle{position:absolute;width:8px;height:8px;border-radius:50%;background:white;box-shadow:0 0 16px 4px rgba(255,255,255,.75);animation:twinkle 2.5s ease-in-out infinite;opacity:.55}@keyframes twinkle{0%,100%{transform:scale(.45);opacity:.2}50%{transform:scale(1.25);opacity:.85}}
    .card{position:relative;z-index:2;width:min(92vw,760px);padding:clamp(26px,5vw,54px);border:1px solid rgba(255,255,255,.28);border-radius:36px;background:linear-gradient(145deg,rgba(255,255,255,.22),rgba(255,255,255,.08));box-shadow:0 32px 90px var(--shadow),inset 0 1px 0 rgba(255,255,255,.28);backdrop-filter:blur(18px);text-align:center;overflow:hidden}.card:before{content:"";position:absolute;width:260px;height:260px;border-radius:50%;top:-120px;right:-90px;background:radial-gradient(circle,rgba(255,209,102,.55),transparent 68%);animation:pulse 4s ease-in-out infinite}.card:after{content:"";position:absolute;width:340px;height:340px;border-radius:50%;bottom:-180px;left:-130px;background:radial-gradient(circle,rgba(255,79,163,.46),transparent 68%);animation:pulse 5s ease-in-out infinite reverse}@keyframes pulse{0%,100%{transform:scale(.92);opacity:.65}50%{transform:scale(1.14);opacity:1}}.content{position:relative;z-index:2}.badge{display:inline-flex;align-items:center;gap:10px;padding:10px 18px;border-radius:999px;background:rgba(255,255,255,.17);border:1px solid rgba(255,255,255,.25);font-size:15px;margin-bottom:18px}.dot{width:10px;height:10px;border-radius:50%;background:var(--green);box-shadow:0 0 16px var(--green);animation:blink 1.4s infinite}@keyframes blink{50%{opacity:.35;transform:scale(.75)}}h1{margin:0;font-size:clamp(32px,7vw,62px);line-height:1.2;letter-spacing:-1px;text-shadow:0 8px 22px rgba(0,0,0,.22)}.subtitle{max-width:600px;margin:18px auto 34px;font-size:clamp(16px,2.5vw,21px);line-height:1.9;color:rgba(255,255,255,.88)}
    .buttons{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-top:10px}.game-btn{position:relative;display:flex;align-items:center;justify-content:center;gap:12px;min-height:88px;padding:18px;border-radius:24px;color:#15133f;text-decoration:none;font-weight:900;font-size:clamp(18px,3vw,25px);overflow:hidden;transition:transform .25s ease,box-shadow .25s ease,filter .25s ease;box-shadow:0 16px 32px rgba(0,0,0,.22)}.game-btn:first-child{background:linear-gradient(135deg,#fff4a3,#ffd166 50%,#ff9f1c)}.game-btn:nth-child(2){background:linear-gradient(135deg,#c7f9ff,#35e7a2 48%,#00b4d8)}.game-btn:before{content:"";position:absolute;inset:-80% -35%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);transform:rotate(18deg) translateX(-120%);transition:transform .55s ease}.game-btn:hover,.game-btn:focus-visible{transform:translateY(-8px) scale(1.02);filter:saturate(1.14);box-shadow:0 26px 48px rgba(0,0,0,.28);outline:none}.game-btn:hover:before,.game-btn:focus-visible:before{transform:rotate(18deg) translateX(120%)}.icon{width:46px;height:46px;display:inline-grid;place-items:center;border-radius:16px;background:rgba(255,255,255,.45);font-size:28px;animation:bounce 2.2s ease-in-out infinite}.game-btn:nth-child(2) .icon{animation-delay:.35s}@keyframes bounce{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-8px) rotate(5deg)}}.footer-note{margin-top:26px;font-size:14px;color:rgba(255,255,255,.76)}.orbit{position:absolute;inset:22px;border:1px dashed rgba(255,255,255,.22);border-radius:30px;pointer-events:none;animation:orbitGlow 6s linear infinite}@keyframes orbitGlow{0%{clip-path:inset(0 0 94% 0)}25%{clip-path:inset(0 94% 0 0)}50%{clip-path:inset(94% 0 0 0)}75%{clip-path:inset(0 0 0 94%)}100%{clip-path:inset(0 0 94% 0)}}@media(max-width:620px){body{overflow:auto;padding:22px 0}.buttons{grid-template-columns:1fr}.game-btn{min-height:78px}.card{border-radius:28px}.orbit{display:none}}
  </style>
</head>
<body>
  <div class="math-bg" id="mathBg" aria-hidden="true"></div>
  <main class="card" role="main"><div class="orbit"></div><section class="content">
    <div class="badge"><span class="dot"></span> آماده برای یادگیری با بازی</div>
    <h1>سرزمین بازی‌های ریاضی</h1>
    <p class="subtitle">یکی از بازی‌های کمک‌آموزشی را انتخاب کن و با تمرین‌های شاد، مهارت‌های ریاضی‌ات را قوی‌تر کن!</p>
    <nav class="buttons" aria-label="انتخاب بازی">
      <a class="game-btn" href="./game1.html"><span class="icon">➕</span><span>بازی اول</span></a>
      <a class="game-btn" href="./game2.html"><span class="icon">✖️</span><span>بازی دوم</span></a>
    </nav>
    <div class="footer-note">برای شروع، روی دکمه‌ی بازی مورد نظر کلیک کن.</div>
  </section></main>
  <script>
    const bg=document.getElementById('mathBg'),symbols=['+','−','×','÷','=','π','√','Σ','7','12','۳','۹'];
    function createSymbol(i){const e=document.createElement('span');e.className='symbol';e.textContent=symbols[Math.floor(Math.random()*symbols.length)];e.style.left=Math.random()*100+'vw';e.style.fontSize=28+Math.random()*52+'px';e.style.setProperty('--duration',10+Math.random()*13+'s');e.style.setProperty('--drift',Math.random()*220-110+'px');e.style.animationDelay=-i*.8+'s';bg.appendChild(e)}
    function createSparkle(){const e=document.createElement('span');e.className='sparkle';e.style.left=Math.random()*100+'vw';e.style.top=Math.random()*100+'vh';e.style.animationDelay=Math.random()*2.5+'s';bg.appendChild(e)}
    for(let i=0;i<28;i++)createSymbol(i);for(let i=0;i<34;i++)createSparkle();
  </script>

</html>
